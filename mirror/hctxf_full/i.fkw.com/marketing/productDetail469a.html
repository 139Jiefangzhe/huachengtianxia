<script>
    /**
     * 提示弹窗(共用)
     * */
    var marketPop = (function(){
        /**
         * popType -- 弹窗类型
         * popTitle -- 弹窗标题头
         * title	-- 内容标题
         * content	-- 内容
         * btnInfo1,btnInfo2 为对象{text,href,dogId, srcId}
         * */
        var $popup = null;
        var html = [];

        function initPop(popType, popTitle, title, content, btnInfo1, btnInfo2){
            $popup = null;
            html = [];
            html.push('	<div class="m-mesg-pop m-mesg-'+popType+'" style="margin-left: -191px;margin-top: -195px;position:fixed">');
            html.push('		<div class="m-mesg-head">');
            if(popTitle != null){
                html.push('			<span class="m-mesg-pop-itle">'+popTitle+'</span>');
            }
            html.push('			<span class="m-mesg-close"></span>');
            html.push('		</div>');
            html.push('		<div class="m-mesg-box">');
            if(title != null){
                html.push('			<div class="m-mesg-title">'+title+'</div>');
            }
            html.push('			<div class="m-mesg-content">'+content+'</div>');
            if(btnInfo1 != null || btnInfo2 != null){
                html.push('			<div class="m-mesg-btn-wrapper">');
                if(btnInfo1 != null && btnInfo1.text){
                    html.push('				<span class="m-mesg-btn-confirm">'+btnInfo1.text+'</span>');
                }
                if(btnInfo2 != null && btnInfo2.text){
                    html.push('				<span class="m-mesg-btn-close">'+btnInfo2.text+'</span>');
                }
                html.push('			</div>');
            }
            html.push('		</div>');
            html.push('	</div>');

            if(top.$('.popupBg').length == 0 ){//存在其他弹窗,则不显示
                Fai.bodyBg();
                $popup = $(html.join('')).appendTo($("body"));
            }

            $popup.find('.m-mesg-btn-confirm').click(function(){
                btnHandle(popType, btnInfo1);
                closePop();
            });

            $popup.find('.m-mesg-btn-close').click(function(){
                btnHandle(popType, btnInfo2);
                closePop();
            });

            $popup.find('.m-mesg-close').click(function(){
                closePop();
            });
        }

        function btnHandle(popType,btnInfo){
            if(btnInfo!=null){
                if(btnInfo.href){
                    window.open(btnInfo.href, "_blank");
                }
                if(btnInfo.dogId && btnInfo.srcId && !isOem){
                    Portal.logDog(btnInfo.dogId, btnInfo.srcId);
                }
            }
        }

        function closePop(){
            Fai.removeBodyBg();
            $popup.remove();
        }
        return{
            show: function(popType, popTitle, title, content, btnInfo1, btnInfo2){
                initPop(popType, popTitle, title, content, btnInfo1, btnInfo2);
            }
        }
    }());
</script>
