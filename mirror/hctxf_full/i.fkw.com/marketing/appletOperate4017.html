<script type="text/html" id="picList">
    <div class="picList">
        <div class="pic1">
            <div style="position: relative;">
                <div class="banner01">
                    <div class="btn" @click="toConsult()">立即预约<span>免费诊断</span>和<span>运营方案</span> ></div>
                </div>
            </div>
        </div>
        <div class="pic2">
            <div class="container">
                <h3 class="pic_title">小程序运营痛点</h3>
                <ul class="painspot_list">
                    <li v-for="(item, index) in painspotList" :key="index" class="painspot_li">
                        <div :class="['painspot_image', 'painspot_image_' + (index + 1)]"></div>
                        <p class="painspot_title">{{item.title}}</p>
                        <p class="painspot_des">{{item.des}}</p>
                    </li>
                </ul>
            </div>
        </div>
        <div class="pic3">
            <div class="container">
                <h3 class="pic_title">服务速览</h3>
                <ul class="scanning_left" @mouseover="handleMouseOver" @mouseout="handleMouseOut">
                    <li v-for="(item, index) in scanningList" @click="selectScanning(index)" :key="index" :class="['scanning_left_item', scanningKey == (index + 1) ? 'active' : '']">
                        <span class="scanning_left_line"></span>
                        <span :class="['scanning_left_label', 'label' + (index + 1)]">{{item.label}}</span>
                    </li>
                </ul>
                <ul class="scanning_right" @mouseover="handleMouseOver" @mouseout="handleMouseOut">
                    <li v-for="(item, index) in scanningList" :key="index" class="scanning_right_item item1" :class="['scanning_right_item', 'item' + (index + 1), scanningKey == (index + 1) ? 'active' : '']">
                        <p class="scanning_right_title">{{item.label}}</p>
                        <div class="scanning_right_des">
                            <p v-for="(des, idx) in item.desList" :key="idx">{{des}}</p>
                        </div>
                        <div @click="toConsult()" class="btn">马上咨询</div>
                    </li>
                </ul>
            </div>
        </div>
        <div class="pic4">
            <div class="container" >
                <h3 class="pic_title">服务亮点</h3>
                <div class="bright_points_bg"></div>
                <div v-for="(item, index) in brightPointsList" :key="index" :class="['bright_points_list', 'points' + (index + 1)]">
                    <div :class="['bright_points_icon', 'icon' + (index + 1)]"></div>
                    <p class="bright_points_title">{{item.title}}</p>
                    <p class="bright_points_des">{{item.des}}</p>
                </div>
                <div class="btn" @click="toConsult()">马上咨询</div>
            </div>
        </div>
        <div class="pic5">
            <div class="container" >
                <h3 class="pic_title">服务案例</h3>
                <div class="pic_list_content">
                    <div v-for="(item, index) in caseList" :key="index" @click="selectCase(index)" :class="['pic_list_item', caseKey == (index + 1) ? 'active' : '']">{{item.tab}}</div>
                </div>
                <div class="pic_content">
                    <div class="content-block">
                        <div class="case-left-content">
                            <div class="swiper-container" id="zsg-ex-container">
                                <div class="swiper-wrapper">
                                    <div class="swiper-slide" v-for="(item, index) in 2" :key="index">
                                        <div :class="['plinth-left', 'plinth-left-' + caseKey + '-' + (index + 1)]"></div>
                                    </div>
                                </div>
                                <div class="swiper-pagination" id="zsgExPagination"></div>
                            </div>
                        </div>
                        <div class="plinth-right">
                            <div class="plinth-right-head">
                                <p class="plinth-right-title">{{caseList[caseKey - 1].title}}</p>
                                <p class="plinth-right-label">核心策略：</p>
                                <p v-for="(item, index) in caseList[caseKey - 1].des" :key="index" class="plinth-right-des">{{item}}</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
