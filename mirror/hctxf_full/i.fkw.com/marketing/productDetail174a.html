    var imgDialog = new Vue({
        el: '.img-dialog',
        data: {
            imgUrl: '',
            isShow: false
        },
        watch: {
            isShow: function (val) {
              if (val === true) {
                $('.img-dialog-mask').show();
              } else {
                $('.img-dialog-mask').hide();
              }
              this.isShow = val;
            }
        },
        methods: {
            showDialog: function (imgUrl) {
                this.imgUrl = imgUrl;
                this.isShow = true;
            },
            setSize: function (info) {
                if (!$.isEmptyObject(info)) {
                  $('.img-dialog').css(info);
                }
            }

        }
    });
    $(function () {
      $('.img-dialog-mask').click(function () {
        imgDialog.isShow = false;
      })
    })
</script>
