<script type="text/html" id="picList">
    <div class="picList">
        <div class="pic1">
            <div class="container">
                <div class="btn_box">
                    <div class="btn1" @click="toConsult()">免费评估方案</div>
                </div>
            </div>
        </div>
        <div id="service"></div>
        <div class="pic2">
            <div class="container">
                <h3 class="pic_title">一站式定制服务</h3>
                <h4 class="pic_sub_title">精细打磨服务细节 量身定制最优解决方案</h4>
                <div class="pic2_main">
                    <div class="pic2_left">
                        <div :class="['left_image', 'left_image_' + pic2ItemIndex]"></div>
                    </div>
                    <div class="pic2_right">
                        <div :class="['pic_right_item', {'pic_right_item_active': pic2Index == pic2ItemIndex}]" @mouseenter="handlePic2Item(pic2Index)" @click="handlePic2Item(pic2Index)" v-for="(pic2Item, pic2Index) in pic2ItemList">
                            <div class="right_item_top">
                                <span :class="['right_item_icon', 'right_item_icon_' + pic2Index]"></span>
                                <span class="right_item_title">{{pic2Item.title}}</span>
                            </div>
                            <p :class="{'pic2_isShow': pic2Index == pic2ItemIndex}">{{pic2Item.detail}}</p>
                        </div>  
                    </div>
                </div>
            </div>
        </div>
        <div class="pic3">
            <h3 class="pic_title">为什么选择我们</h3>
            <h4 class="pic_sub_title">更专业的方案 更贴心的服务 重新定义定制开发</h4>
            <div class="container">
                <ul class="pic_nav_main">
                    <li v-for="(pic3Item, pic3ItemIndex) in pic3ItemList">
                        <span :class="['pic3_item_icon', 'pic3_item_icon_' + pic3ItemIndex]"></span>
                        <span class="pic3_item_title">{{pic3Item.title}}</span>
                        <p>{{pic3Item.detail}}</p>
                    </li>
                </ul>
            </div>
        </div>
        <div id="flow"></div>
        <div class="pic4">
            <h3 class="pic_title">专业的事情交给专业的人</h3>
            <h4 class="pic_sub_title">更严谨规范的交付流程  值得信赖的定制专家</h4>
            <div class="container" >
                <div class="pic4_main"></div>
            </div>
        </div>
        <div id="promise"></div>
        <div class="pic5">
            <h3 class="pic_title">以客户满意为核心</h3>
            <div class="container" >
                <div class="pic5_left">
                    <span class="title">您的担忧</span>
                    <ul>
                        <li>项目中恶意收费</li>
                        <li>项目设计粗糙</li>
                        <li>研发拖沓周期漫长</li>
                        <li>项目运行不稳定</li>
                        <li>交付后找不到售后</li>
                    </ul>
                </div>
                <div class="pic5_right">
                    <span class="title">我们的承诺</span>
                    <ul>
                        <li>
                            <span></span>
                            <p>售前深入沟通、了解需求，提供专业、透明的解决方案和报价，拒绝隐形收费</p>
                        </li>
                        <li>
                            <span></span>
                            <p>提供需求规划、原型制作和产品设计，确保项目符合客户期望</p>
                        </li>
                        <li>
                            <span></span>
                            <p>项目经理全程监管、严控工期，信息共享、透明公开研发进度，确保项目按时按质交付</p>
                        </li>
                        <li>
                            <span></span>
                            <p>进行功能测试、性能测试、安全测试和用户测试，确保系统稳定可靠</p>
                        </li>
                        <li>
                            <span></span>
                            <p>提供用户培训、服务器运维、及时响应问题和bug修复等服务，保障系统正常运行</p>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
        <div id="guarantee"></div>
        <div class="pic6">
            <h3 class="pic_title">让您的选择没有后顾之忧</h3>
            <div class="container" >
                <ul>
                    <li v-for="(pic6Item, pic6ItemIndex) in pic6ItemList">
                        <span :class="['pic6_icon', 'pic6_icon_' + pic6ItemIndex]"></span>
                        <p class="pic6_title">{{pic6Item.title}}</p>
                        <p>{{pic6Item.detail}}</p>
                    </li>
                </ul>
                <div class="pic6_btn" @click="toConsult()">咨询定制</div>
            </div>
        </div>
        <div id="case"></div>
        <div class="pic7">
            <h3 class="pic_title">客户案例</h3>
            <div class="container" >
                <div class="pic7_nav">
                    <ul>
                        <li :class="['pic7_sliding', 'pic7_sliding_' + pic7NavIndex]"></li>
                        <li :class="['pic7_nav_item', {'active': pic7NavIndex == pic7NavItem.value}]" v-for="pic7NavItem in pic7NavList" @click="handleNavClick(pic7NavItem.value)">{{pic7NavItem.name}}</li>
                    </ul>
                </div>
                <div class="pic7_main">
                    <div class="pic7_main_left">
                        <div :class="'pic7_main_left_' + pic7NavIndex"></div>
                    </div>
                    <div class="pic7_main_right">
                        <h3>项目背景</h3>
                        <p>{{pic7ItemList[pic7NavIndex].detail}}</p>
                        <h3>方案构思</h3>
                        <p v-for="ideaItem in pic7ItemList[pic7NavIndex].idea">{{ideaItem}}</p>
                    </div>
                </div>
            </div>
        </div>
        <div class="pic8">
            <h3 class="pic_title">他们都选择了凡科</h3>
            <div class="container" >
                <ul>
                    <li v-for="pic8Item in pic8ItemList" :class=" 'pic8_icon_' + pic8Item"></li>
                </ul>
            </div>
        </div>
        <div id="aptitude"></div>
        <div class="pic9">
            <h3 class="pic_title">实力沉淀值得信赖</h3>
            <h4 class="pic_sub_title">十几年技术积累  上市公司品质更放心</h4>
            <div class="container" >
                <div class="swiper">
                    <div class="swiper-wrapper" style="transition-timing-function: linear;">
                        <div :class="['swiper-slide', {'width414': swiperItemListIndex == 4}]" v-for="(swiperItem, swiperItemListIndex) in swiperItemList" :key="swiperItemListIndex">
                            <div :class="['pic9_image', 'pic9_image_' + swiperItemListIndex]"></div>
                            <div class="pic9_icon"></div>
                            <p :class="{'width414': swiperItemListIndex == 4}">{{swiperItem}}</p>
                        </div>
                    </div>
                </div>
            </div>
            <div class="pic9_boder"></div>
        </div>
        <div class="pic10">
            <div class="container" >
                <h3 class="pic10-title" >预约您的专属定制顾问</h3>
                <div class="input-container">
                    <div class="input-wrapper mr-40">
                        <input v-model="consultName" placeholder="您的称呼" />
                    </div>
                    <div class="input-wrapper mr-40">
                        <input v-model="consultPhone" placeholder="您的联系电话" />
                    </div>
                    <div @click.stop="togglePrioritySelect('type')" class="input-wrapper mr-40">
                        <input id="type-value" readonly="readonly" placeholder="您要定制的类型" />
                        <span :class="showTypeSelect ? 'delta' : 'reverse-delta'"></span>
                        <div v-if="showTypeSelect" class="priority-select">
                            <div @click="selectPriority('type', '01', '网站定制')" class="select-item">网站定制</div>
                            <div @click="selectPriority('type', '07', '商城定制')" class="select-item">商城定制</div>
                            <div @click="selectPriority('type', '06', '小程序定制')" class="select-item">小程序定制</div>
                            <div @click="selectPriority('type', '08', 'H5定制')" class="select-item">H5定制</div>
                            <div @click="selectPriority('type', '09', '其他')" class="select-item">其他</div>
                        </div>
                  </div>
                  <div @click.stop="togglePrioritySelect('budget')" class="input-wrapper">
                    <input id="channel-value" readonly="readonly" placeholder="您的初步预算" />
                    <span :class="showBudgetSelect ? 'delta' : 'reverse-delta'"></span>
                    <div v-if="showBudgetSelect" class="priority-select">
                        <div @click="selectPriority('budget', '01', '1万元内')" class="select-item">1万元内</div>
                        <div @click="selectPriority('budget', '02', '1-3万元')" class="select-item">1-3万元</div>
                        <div @click="selectPriority('budget', '03', '3-5万元')" class="select-item">3-5万元</div>
                        <div @click="selectPriority('budget', '04', '5万元以上')" class="select-item">5万元以上</div>
                    </div>
                  </div>
                </div>
                <div class="pic10_btn" @click="consultNow">立即预约</div>
            </div>
        </div>
        <bottom-tips style="margin-top: 0px"></bottom-tips>
    </div>
</script>
