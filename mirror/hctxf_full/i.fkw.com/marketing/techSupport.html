<script type="text/html" id="leftModule">

<script type="text/html" id="rightModule">

        <switch-sid v-if="baseInfo.siteList && baseInfo.siteList.length" :cur-sid='curSid' :site-list='baseInfo.siteList' @switch-site="switchSite"></switch-sid>

                        <i class="jinxian">{{curProduct.refundInform}}</i>

            <div class="buy-btn" @click="addCart">立即抢购</div>
        </div>
    </div>
</script>

<script>
var vm = new Vue({
    el:"#main",
    mixins: [topBarScroll_mixin, sub_product_vm_mixin],
    data:{
        pageInfo: {}, // 页面信息
        navInfo:{	                        //topbar专业配置
            _type: "",			            //左侧-fixetobar类型
            _name: "隐藏技术版权信息",		     //左侧-加粗大标题
            _text: "一次购买，永久有效",	  //左侧-小标题
            _pick : 1,						//当前展示的模块（定位高度和选中状态）
        }
    },
    computed: {
        leftPro: function () {
            var ret = {
                leftProTitle: "隐藏技术版权信息",
                leftProDesc: "隐藏凡科信息",
                leftProDesc1: "提升自有品牌曝光效果",
            };
            return ret;
        }
    },
    methods:{
        // 根据业务使用接口
        initPageInfo: function () {
            var pageType = 'mall';
            switch (pageType) {
                case 'mall':
                    this.pageInfo = {
                        bizType: "商城",
                        getInfoName: "/ajax/version2/shopSiteSpace_h.jsp?cmd=getNewMallTechSupPkg"
                    }
                    break;
                case 'edu':
                    this.pageInfo = {
                        bizType: "教育",
                        getInfoName: "/ajax/version2/shopEdu_h.jsp?cmd=getNewEduTechSupPkg"
                    }
                    this.navInfo._name = "凡科教育隐藏技术版权信息";
                    this.leftPro.leftProTitle = "凡科教育隐藏技术版权信息";
                    break;
                case 'yueke':
                    this.pageInfo = {
                        bizType: "门店通",
                        getInfoName: "/ajax/version2/shopYueke_h.jsp?cmd=getNewYkTechSupPkg"
                    }
                    break;
            }
            this.getInfo(true);
        },
        //普通购买
        addFkwCart: function (productId, type, skuId, sid, updateId, bizId, vipType, curProduct, curPrice) {
            var that = this;
            if (Fai.top._cid == 0) {
                Portal.showLoginComp();
                return
            }
            if (Number(sid) < 0) {
                that.getInfo();
                return 
            }
            // 提交订单
            this.ftsRapidAddOrder(productId, type, skuId, sid, updateId, bizId, vipType, curProduct, curPrice);
        }
    },
    created: function () {
        this.initPageInfo();
    }
});
</script>
