<script type="text/javascript">
(function(){
	Fai.top.popoverTip = new Fai.top.Vue({
		el:"#popoverTip",
		template:""+
		"<div>"+
			"<popover-component v-show='show' :w='500' :h='335' @close='handleClose'>"+
				"<template slot='content'>"+
	        		"该文件在网站中可能被引用，替换后引用的地方也将被替换"+
	    		"</template>"+
	    		"<div slot='operate'>"+
	    			"<button-component global-oper class='popover_operate_button' @click='handleSure'>确 定</button-component>"+
	    			"<button-component global-oper class='popover_operate_button' @click='handleCancle'>取 消</button-component>"+
	    		"</div>"+
			"</popover-component>"+
		"</div>",
		data(){
			return{
				show: false,
				fileInfo:{},
			};
		},
		methods: {
			handleSure() {
	            var fileInfo = this.fileInfo;
				$.ajax({
					type:"POST",
					url:"/ajax/siteImage_h.jsp?cmd=wafNotCk_replaceSiteImg&imgId=",
					data: fileInfo,
					success:function(result){
						result = $.parseJSON($.trim(result));
						if(result.success){
							window.setTimeout(function(){
								window.location.reload();
							},1000);
						}
						Fai.ing(result.msg,true,2000);
					},
					error:function(data){
						Fai.ing("系统繁忙。",true,2000);
					}
				});
				this.show = false;
				Fai.closePopupWindow(popupWindowId);
				Fai.ing("文件替换中，请耐心等待。",false);
	        },
	        handleCancle() {
	            this.show = false;
	        },
	        handleClose() {
	            this.show = false;
	        },
		},
		watch:{
			show(val){
			}
		}
	});
}())

var popupWindowId = -1;

function replacePicture(){
	if(true){
		Fai.ing("无法解析的文件类型，不支持替换。",true,2000);
		return;
	}
	var popupWindow = Fai.popupWindowVersionTwo.createPopupWindow({
        title: "替换当前文件",
        divContent: "" +
        "<div id='group_edit_popup' style='width: 100%;position: relative;text-align: center;'>" +
        	"<div v-show='showTip' style='position: absolute;top:16px;width:100%;'>"+
        		"<alert-component>"+
        			"{{tipText}}"+
        		"</alert-component>"+
        	"</div>"+
			"<button-component style='top: 76px; position: relative;padding-left: 30px;padding-right: 30px;' :disabled='uploadding' :active='true' @click.stop='uploadImg()'>"+
				"上传文件"+
			"</button-component>"+
			"<button ref='uploadBtn' style='display:none;'></button>"+
			"<div style='box-sizing: border-box;width: 100%;text-align: center;position: relative;top:88px;font-size: 13px;color: #333333;padding: 0 15px;overflow: hidden;white-space: nowrap;text-overflow: ellipsis;'>"+
				"{{newImgName}}"+
			"</div>"+
        "</div>",
        width: 360,
        height: 315,
        version: 2,
        saveBeforePopup: false,
        popUpWinZIndex: 9904
    });
	var popupId = popupWindow.getPopupWindowId();
	popupWindowId = popupId;
    Fai.top.$("#popupWindow" + popupId).css('overflow', 'visible');
    Fai.popupWindowVersionTwo.addPopupWinBtnComponentDom({
        popupId: popupId,
        id: 'replace',
        text: '替 换',
        click: 'replace',
        disable:true,
        active: false
    });
    Fai.popupWindowVersionTwo.addPopupWinBtnComponentDom({
        popupId: popupId,
        id: 'cancel',
        text: '取 消',
        click: 'cancel',
        active: false
    });
    Fai.popupWindowVersionTwo.renderPopupWinBtnComponent({
        popupId: popupId,
        initEvents: {replace: replace, cancel: cancel}
    });
    var popup = new Fai.top.Vue({
        el: Fai.top.document.getElementById('group_edit_popup'),
        data: function(){
            return{
            	show: false,
				popupId:popupId,
				str_fileType:"",
				newImgName:"",
				file:{},
				tipText:"仅支持替换与当前文件类型一致的文件",
				sizeLimit:0,
				fileMd5:"",
				uploadding: false,
				canUpload: true,
			}
        },
        computed:{
			showTip: function(){
				this.replaceBtnChange();
				return this.tipText != "";
			}
		},
        methods:{
        	uploadImg: function(){
        		Site.logDog(200802, 5);
        		this.fileMd5 = "";
        		this.file = {};
				$(this.$refs.uploadBtn).find("a").click();
			},
        	replaceBtnChange: function(){
        		var that = this;
				var flag = that.newImgName && that.newImgName.toLowerCase().endsWith(that.str_fileType);
				if(flag){
					flag = (that.file.size <= that.sizeLimit);
				}
				if(flag){
					flag = that.fileMd5 != "";
				}
				Fai.enablePopupWindowBtn(that.popupId, 'replace', flag);
				return flag;
        	}
    	},
    	watch:{
			newImgName:function(val){
				var type = this.str_fileType;
				if(val && !val.toLowerCase().endsWith(type)){
					this.tipText = "仅支持替换与当前文件类型一致的文件";
				}
			},
			file:function(val){
				this.newImgName = this.file.name;
			},
			'file.size':function(val){
				if(val>this.sizeLimit){
					this.tipText = "文件大小超过"+(this.sizeLimit>>10>>10)+"M,请压缩处理后再替换。";
				}
			},
			'uploadding': function(val){
				if(val){
					this.tipText = "文件上传中...";
				}
			}
		},
		mounted(){
			var fileSize = 0;
			var that = this;
			var advance_setting = {   
		        auto:true,
		        fileTypeExts:"",
		        multi:false,
		        fileSizeLimit:fileSize*1024*1024,
				fileSplitSize:20*1024*1024,
		        breakPoints:true,
		        saveInfoLocal:false,
		        showUploadedPercent:false,//是否实时显示上传的百分比，如20%
		        showUploadedSize:true,
		        removeTimeout:9999999,
		        isResizeImg:false,
		        getFileSizeUrl:"/ajax/advanceUpload.jsp?cmd=_getUploadSize",//获取文件大小url
		        uploader:'/ajax/advanceUpload.jsp?cmd=_uploadToTmp',//调用genUploadUrl 可改变url
		        onUploadSuccess: function(file,text){
		            var data = jQuery.parseJSON(text);
	            	report(file,1,data.success);
	            	that.uploadding = false;
		            that.tipText = "";
		            if(data.success){
		            	that.fileMd5 = data.fileMd5;
		            	Fai.top.popoverTip.fileInfo = data;
		            	Fai.top.popoverTip.fileInfo.size = that.file.size;
		            }else{
		            	that.file = {};
		            	that.fileMd5 = "";
		            	Fai.ing(data.msg, false);
		            }
		        },
		        onUploadError: function(file,text){
		        	that.tipText = "";
		        	$("#progressBody_ "+ file.id).remove();
		        	$("#progressWrap_" + file.id).remove();
		        	Fai.ing("网络繁忙，文件:"+file.name+"上传失败，请稍候重试",false);
		        	_uTime = new Date().getTime()-_uTime;
        		    report(file,1,false);
		        },
		        onSelect: function(files){
		        	that.newImgName = files[0].name;
					if(!files[0].name.toLowerCase().endsWith(that.str_fileType)){
						that.tipText = "仅支持替换与当前文件类型一致的文件";
						$("#progressBody_ "+ that.file.id).remove();
		        		$("#progressWrap_" + that.file.id).remove();
						return false;
					}
					if(files[0].size > that.sizeLimit){
						that.tipText = "文件大小超过"+(that.sizeLimit>>10>>10)+"M,请压缩处理后再替换。";
						$("#progressBody_ "+ that.file.id).remove();
		        		$("#progressWrap_" + that.file.id).remove();
						return false;
					}
					that.file = files[0];
					return true;
		        },
		        onUploadStart: function(file){
		        	_uTime = new Date().getTime();
					$("#progressBody_ "+ file.id).remove();
		            $("#progressWrap_" + file.id).remove();
		        },
		        msgInfo: function(type, msg){
		        	that.tipText = "仅支持替换与当前文件类型一致的文件";
		        	if(type === 'warning'){
		        		if(msg.indexOf("单个文件大小不能超过") == 0 ){
		        			that.tipText = "文件大小超过"+(that.sizeLimit>>10>>10)+"M,请压缩处理后再替换。";
		        		}
		        	}
		        },
		        onUploadProgress:function(e){
		        	that.uploadding = true;
		        }
		    }

			uploadObj = $(this.$refs.uploadBtn).uploadify(advance_setting);

		}
    });

    function cancel(){
		Fai.closePopupWindow(popupId);
	}

	function replace(){
		Fai.top.popoverTip.show = true;
	}

	function report(tempFile, tempType, tempFlag){
		var tempTime = new Date().getTime() - _uTime;
		var tempSize = 0;
		var tempName = "";
		if(typeof(tempFile)!='undefined'){
			tempSize = tempFile.size;
			tempName = tempFile.name;
		}
		$.ajax({
			url:"/ajax/advanceUpload.jsp?cmd=_report",
			type:"post",
			data:{"type":tempType,"size":tempSize,"time":tempTime,"flag":tempFlag,"name":tempName},
			success:function(data){
			}
		});
	}
}
window.fileDownload = function() {
	Site.logDog(200802, 3);
	
}
</script>
