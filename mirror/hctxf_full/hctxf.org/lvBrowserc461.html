    <link type="text/css" href="../fe.508sys.com/browserChecked_1_0/css/browserCheck.min3ef9.css?v=202006051520" rel="stylesheet"><script type="text/javascript" src="../fe.508sys.com/browserChecked_1_0/js/browserCheckHtml.min998c.js?v=202203281611"></script>

<body>
		<script type="text/javascript">
      var isLegalUrl = false;
      var version = "";
      var _manageMode = false;
			var browserInfo = BrowserChecked({reverse:true,notSupportList:[{name:"ie",version:version}]});
				if(browserInfo.isSupport){
            //非法url不做跳转，提示链接错误
            if(isLegalUrl) {
              var url = 'index.html';

              window.location.href = ''+url;
            }else {
              showNotLegalUrlTips();
            }
					  
				} else{
           showBrowserTipsHtml(browserInfo);
        }

        var before = "index.html";
        if (before===null||before==='null'||before==='') {
            // 官网的，修改一下默认的样式。
            var tipText = document.getElementsByClassName("tipsText")[0],
            guideContent = document.getElementsByClassName("guideContent")[0],
            splitLine = document.getElementsByClassName("f-splitLine")[0],
            browserDown = document.getElementsByClassName("f-browserDown")[0];
            tipText.innerText = "";
            var p1 = document.createElement("p");
            var p2 =  document.createElement("p");
            p1.innerText = "您的浏览器不支持此预览，建议您使用360极速浏览器";
            p2.innerText = "（若您使用的是双核浏览器，请切换至极速模式）";
            tipText.appendChild(p1);
            tipText.appendChild(p2);
            browserDown.style.marginTop = '30px';
            guideContent.removeChild(splitLine);
            window.onmousewheel = function(e){
                e = e||window.event;
                if (e&&e.preventDefault) {
                  e.preventDefault();
                  e.stopPropagation();
                }else{
                  e.returnvalue = false;
                  return false;
                }
            }
            document.addEventListener("DOMMouseScroll",function(e){
              e = e||window.event;
              e.preventDefault();
              e.stopPropagation();
            });
        }

        if(!_manageMode){
          // 组件中的提示都是写明管理态的。这里需要fix下访客态的情况。
          var tipText = document.getElementsByClassName("tips")[0],
              tipInnerText = tipText.innerText;
          tipInnerText = tipInnerText.replace("管理态", "访客态");
          tipText.innerText = tipInnerText;
        }

        function showNotLegalUrlTips() {
          var div = document.createElement("div");
          div.innerHTML = "很抱歉，您访问的页面不存在！请仔细检查您输入的网址是否正确。";
          document.body.appendChild(div);
        }
		</script>
<!--test browserCheck-->
</script>
</body>
