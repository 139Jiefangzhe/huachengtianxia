user nginx;
worker_processes auto;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  map_hash_max_size 2048;
  map_hash_bucket_size 128;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';

  access_log /var/log/nginx/access.log main;
  error_log /var/log/nginx/error.log warn;

  sendfile on;
  keepalive_timeout 65;
  server_tokens off;

  include /etc/nginx/conf.d/redirects/legacy.map;
  include /etc/nginx/conf.d/redirects/legacy.internal.map;
  include /etc/nginx/conf.d/redirects/gray-mode.conf;

  geo $legacy_internal_client {
    default 0;
    127.0.0.1/32 1;
    ::1/128 1;
    10.0.0.0/8 1;
    172.16.0.0/12 1;
    192.168.0.0/16 1;
    fc00::/7 1;
    fe80::/10 1;
  }

  map "$legacy_redirect_mode:$legacy_internal_client" $legacy_redirect_target_effective {
    default "";
    "all:0" $legacy_redirect_target;
    "all:1" $legacy_redirect_target;
    "internal:1" $legacy_redirect_target_internal;
  }

  include /etc/nginx/conf.d/*.conf;
}
