services:
  nginx:
    image: nginx:1.27-alpine
    container_name: hctxf-nginx
    ports:
      - "${NGINX_HTTP_PORT:-8080}:80"
      - "${NGINX_MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/conf.d:/etc/nginx/conf.d:ro
      - ../nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      frontend:
        condition: service_healthy
      directus:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/healthz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    container_name: hctxf-frontend
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      NEXT_TELEMETRY_DISABLED: 1
      DIRECTUS_URL: ${DIRECTUS_URL:-http://directus:8055}
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: hctxf-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hctxf}
      POSTGRES_USER: ${POSTGRES_USER:-hctxf_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ChangeMe_DB_123456}
    volumes:
      - pgdata:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hctxf_user} -d ${POSTGRES_DB:-hctxf}"]
      interval: 10s
      timeout: 5s
      retries: 8
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: hctxf-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 8
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: hctxf-redis
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 8
    restart: unless-stopped

  directus:
    image: directus/directus:10.13.1
    container_name: hctxf-directus
    ports:
      - "${DIRECTUS_PORT:-8055}:8055"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      KEY: ${DIRECTUS_KEY:-replace-with-random-key}
      SECRET: ${DIRECTUS_SECRET:-replace-with-random-secret}
      ADMIN_EMAIL: ${DIRECTUS_ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${DIRECTUS_ADMIN_PASSWORD:-ChangeMe_123456}

      DB_CLIENT: pg
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB:-hctxf}
      DB_USER: ${POSTGRES_USER:-hctxf_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-ChangeMe_DB_123456}

      PUBLIC_URL: ${DIRECTUS_PUBLIC_URL:-http://localhost:8055}
      CACHE_ENABLED: true
      CACHE_STORE: redis
      REDIS: redis://redis:6379

      STORAGE_LOCATIONS: minio
      STORAGE_MINIO_DRIVER: s3
      STORAGE_MINIO_KEY: ${MINIO_ROOT_USER:-minioadmin}
      STORAGE_MINIO_SECRET: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      STORAGE_MINIO_BUCKET: ${MINIO_BUCKET:-hctxf-assets}
      STORAGE_MINIO_REGION: ${MINIO_REGION:-us-east-1}
      STORAGE_MINIO_ENDPOINT: http://minio:9000
      STORAGE_MINIO_FORCE_PATH_STYLE: true

      CORS_ENABLED: true
      CORS_ORIGIN: true
    volumes:
      - ../schema:/workspace/schema
      - ../scripts:/workspace/scripts
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8055/server/ping >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  data-migrator:
    image: node:20-alpine
    container_name: hctxf-data-migrator
    profiles: ["tools"]
    working_dir: /workspace
    volumes:
      - ../../:/workspace
    command: ["sh", "-c", "echo 'Run migrate script manually: node platform/scripts/migrate-data.mjs --dry-run --input mirror/hctxf_full/hctxf.org'"]
    depends_on:
      directus:
        condition: service_healthy

volumes:
  pgdata:
  minio-data:
